<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MagicBus — Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0f1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0,212,255,0.08);
    }

    .logo { text-align:center; margin-bottom:1.5rem; }
    .logo h1 { font-size:2rem; font-weight:800; color:#00d4ff; }
    .logo p  { color:#6b7280; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; margin-top:4px; }

    .tabs {
      display: flex;
      background: #1f2937;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .tab.active {
      background: #111827;
      color: #00d4ff;
      box-shadow: 0 0 10px rgba(0,212,255,0.1);
    }

    .form { display:none; }
    .form.active { display:block; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 0.72rem 1rem;
      color: #f9fafb;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
      font-family: 'Segoe UI', sans-serif;
    }

    input:focus { border-color: #00d4ff; }

    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login    { background: linear-gradient(135deg, #00d4ff, #7c3aed); color: #000; }
    .btn-register { background: linear-gradient(135deg, #00e676, #00b4d8); color: #000; }
    .btn:hover    { opacity: 0.88; }

    .msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .msg-error   { background:rgba(255,61,87,0.1);  color:#ff3d57; border:1px solid rgba(255,61,87,0.3); }
    .msg-success { background:rgba(0,230,118,0.1);  color:#00e676; border:1px solid rgba(0,230,118,0.3); }

    .admin-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: #4b5563;
    }

    .admin-link a { color:#ff3d57; text-decoration:none; font-weight:600; }
    .admin-link a:hover { text-decoration:underline; }
  </style>
</head>
<body>

<div class="box">
  <div class="logo">
    <h1>MagicBus</h1>
    <p>Student & Teacher Portal</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="form active" id="loginForm">
    <div class="msg" id="loginMsg"></div>

    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="your@email.com"/>

    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') loginUser()"/>

    <button class="btn btn-login" onclick="loginUser()">Login</button>
  </div>

  <!-- REGISTER FORM -->
  <div class="form" id="registerForm">
    <div class="msg" id="registerMsg"></div>

    <label>Full Name</label>
    <input type="text" id="regName" placeholder="John Doe"/>

    <label>Email</label>
    <input type="email" id="regEmail" placeholder="your@email.com"/>

    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Min 6 characters"/>

    <button class="btn btn-register" onclick="registerUser()">Create Account</button>
  </div>

  <div class="admin-link">
    Admin? <a href="/admin/login.html">Login here</a>
  </div>
</div>

<script>
  if (localStorage.getItem('userToken')) {
    window.location.href = '/dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));

    if (tab === 'login') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('loginForm').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('registerForm').classList.add('active');
    }
  }

  // LOGIN
  async function loginUser() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showMsg('loginMsg', 'Please enter email and password', 'error'); return;
    }

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showMsg('loginMsg', data.message || 'Login failed', 'error'); return;
      }

      if (data.user.role === 'admin') {
        showMsg('loginMsg', 'Admins must login from Admin Panel', 'error'); return;
      }

      localStorage.setItem('userToken', data.token);
      localStorage.setItem('userInfo', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';

    } catch (err) {
      showMsg('loginMsg', 'Server error. Please try again.', 'error');
    }
  }

  // REGISTER
  async function registerUser() {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const role     = 'student';

    if (!name || !email || !password) {
      showMsg('registerMsg', 'Please fill all fields', 'error'); return;
    }

    if (password.length < 6) {
      showMsg('registerMsg', 'Password must be at least 6 characters', 'error'); return;
    }

    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });

      const data = await res.json();

      if (!res.ok) {
        showMsg('registerMsg', data.message || 'Registration failed', 'error'); return;
      }

      showMsg('registerMsg', 'Account created! Please login now ✓', 'success');
      setTimeout(() => {
        switchTab('login');
        document.getElementById('loginEmail').value = email;
      }, 1500);

    } catch (err) {
      showMsg('registerMsg', 'Server error. Please try again.', 'error');
    }
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent   = msg;
    el.className     = `msg msg-${type}`;
    el.style.display = 'block';
  }
</script>

</body>
</html>
